services:

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: arcus
      POSTGRES_USER: arcus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arcus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcus -d arcus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcus

  # -------------------------------------------------------------------------
  # API service
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://arcus:${POSTGRES_PASSWORD:-arcus}@postgres:5432/arcus
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      BASE_DOMAIN: ${BASE_DOMAIN:-thesoftware.dev}
      API_SECRET_KEY: ${API_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.thesoftware.dev`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - arcus

  # -------------------------------------------------------------------------
  # Router (reverse proxy)
  # -------------------------------------------------------------------------
  router:
    build:
      context: router
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://arcus:${POSTGRES_PASSWORD:-arcus}@postgres:5432/arcus
      BASE_DOMAIN: ${BASE_DOMAIN:-thesoftware.dev}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcus

  # -------------------------------------------------------------------------
  # Traefik
  # -------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CF_DNS_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    depends_on:
      - router
      - api
    networks:
      - arcus

volumes:
  postgres_data:
  letsencrypt:

networks:
  arcus:
    driver: bridge
