# Traefik dynamic configuration
http:
  routers:
    # Wildcard router – catches all *.thesoftware.dev requests and sends them
    # to the Arcus router service.
    arcus-wildcard:
      rule: "HostRegexp(`{subdomain:[a-z0-9]{3,32}}.thesoftware.dev`)"
      entryPoints:
        - websecure
      service: arcus-router
      tls:
        certResolver: letsencrypt
        domains:
          - main: "thesoftware.dev"
            sans:
              - "*.thesoftware.dev"
      middlewares:
        - rate-limit

  services:
    arcus-router:
      loadBalancer:
        servers:
          - url: "http://router:8001"
        passHostHeader: true

  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
