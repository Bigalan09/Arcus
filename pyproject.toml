[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes, I = isort, W = pycodestyle warnings
# UP = pyupgrade, B = flake8-bugbear, C4 = flake8-comprehensions
select = ["E", "F", "I", "W", "UP", "B", "C4"]
ignore = [
    "E501",   # line too long – handled by formatter
    "B008",   # do not perform function calls in default arguments (FastAPI pattern)
]

[tool.ruff.lint.isort]
known-first-party = ["api", "router"]

[tool.ruff.lint.per-file-ignores]
# Tests may use assert and import ordering that differs from production code.
"*/tests/*" = ["E402"]
