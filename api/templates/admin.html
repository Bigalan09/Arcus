{% extends "base.html" %}
{% block title %}Admin – Arcus{% endblock %}
{% block content %}
<div class="space-y-8">
  <h1 class="text-2xl font-semibold">Admin Panel</h1>

  <!-- Users -->
  <section class="bg-gray-900 rounded-xl p-5 border border-gray-800">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-medium">Users</h2>
      <button onclick="showUserForm()"
        class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-3 py-1.5">
        Create user
      </button>
    </div>

    <!-- Create user form -->
    <div id="user-form" class="hidden mb-4 space-y-3">
      <input id="u-email" type="email" placeholder="Email address"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
      <select id="u-role"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
        <option value="normal">Normal</option>
        <option value="pro">Pro</option>
      </select>
      <div class="flex gap-2">
        <button onclick="createUser()"
          class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-4 py-1.5 text-sm">Create</button>
        <button onclick="document.getElementById('user-form').classList.add('hidden')"
          class="bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg px-4 py-1.5 text-sm">Cancel</button>
      </div>
      <p id="user-err" class="text-red-400 text-sm hidden"></p>
    </div>

    <table class="w-full text-sm" id="user-table">
      <thead>
        <tr class="text-gray-500 text-xs border-b border-gray-800">
          <th class="text-left py-2">Email</th>
          <th class="text-left py-2">Role</th>
          <th class="text-left py-2">Credits</th>
          <th class="text-left py-2">Joined</th>
          <th class="py-2"></th>
        </tr>
      </thead>
      <tbody id="user-list">
        <tr><td colspan="5" class="py-4 text-gray-500">Loading…</td></tr>
      </tbody>
    </table>
  </section>

  <!-- Blocklist -->
  <section class="bg-gray-900 rounded-xl p-5 border border-gray-800">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-medium">Blocklist</h2>
      <button onclick="showBlocklistForm()"
        class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-3 py-1.5">
        Add word
      </button>
    </div>
    <div id="bl-form" class="hidden mb-4 flex gap-2">
      <input id="bl-word" type="text" placeholder="Word to block"
        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
      <button onclick="addBlocklistWord()"
        class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-4 py-1.5 text-sm">Add</button>
    </div>
    <ul id="blocklist" class="space-y-1 text-sm text-gray-300 max-h-64 overflow-y-auto">
      <li class="text-gray-500">Loading…</li>
    </ul>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
  async function api(path, opts = {}) {
    const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (r.status === 401) { window.location.href = '/login'; return null; }
    if (r.status === 403) { alert('Admin access required'); return null; }
    return r;
  }

  async function loadUsers() {
    const r = await api('/admin/users');
    if (!r) return;
    const users = await r.json();
    // Fetch credits for each user in parallel
    const creditMap = {};
    await Promise.all(users.map(async u => {
      const cr = await api(`/credits?user_id=${u.id}`);
      if (cr && cr.ok) {
        const cj = await cr.json();
        creditMap[u.id] = cj.balance;
      } else {
        creditMap[u.id] = '–';
      }
    }));
    const tbody = document.getElementById('user-list');
    tbody.innerHTML = users.map(u => `
      <tr class="border-b border-gray-800/50 hover:bg-gray-800/30" id="user-row-${u.id}">
        <td class="py-2 pr-4">${u.email}</td>
        <td class="py-2 pr-4">
          <span class="text-xs px-2 py-0.5 rounded-full
            ${u.role === 'admin' ? 'bg-red-900/60 text-red-300' :
              u.role === 'pro' ? 'bg-indigo-900/60 text-indigo-300' :
              'bg-gray-700 text-gray-400'}">${u.role}</span>
        </td>
        <td class="py-2 pr-4 text-gray-300" id="credits-${u.id}">${creditMap[u.id]}</td>
        <td class="py-2 pr-4 text-gray-400 text-xs">${new Date(u.created_at).toLocaleDateString()}</td>
        <td class="py-2 flex gap-3">
          <button onclick="grantCredits('${u.id}')"
            class="text-xs text-green-400 hover:text-green-300">Grant credits</button>
          <button onclick="resetPassword('${u.id}', '${u.email}')"
            class="text-xs text-yellow-400 hover:text-yellow-300">Reset pwd</button>
        </td>
      </tr>`).join('');
  }

  async function grantCredits(userId) {
    const amountStr = prompt('How many credits to grant?');
    if (amountStr === null) return;
    const amount = parseInt(amountStr, 10);
    if (!amount || amount <= 0) { alert('Please enter a positive number.'); return; }
    const r = await api('/credits/grant', { method: 'POST', body: JSON.stringify({ user_id: userId, amount }) });
    if (!r) return;
    if (!r.ok) { const j = await r.json(); alert(j.detail || 'Failed to grant credits.'); return; }
    const j = await r.json();
    const el = document.getElementById(`credits-${userId}`);
    if (el) el.textContent = j.balance;
  }

  function showUserForm() {
    document.getElementById('user-form').classList.remove('hidden');
    document.getElementById('u-email').focus();
  }

  async function createUser() {
    const email = document.getElementById('u-email').value.trim();
    const role = document.getElementById('u-role').value;
    if (!email) return;
    const r = await api('/admin/users', { method: 'POST', body: JSON.stringify({ email, role }) });
    if (!r) return;
    if (!r.ok) {
      const j = await r.json();
      const err = document.getElementById('user-err');
      err.textContent = j.detail || 'Failed to create user.';
      err.classList.remove('hidden');
      return;
    }
    document.getElementById('user-form').classList.add('hidden');
    document.getElementById('u-email').value = '';
    document.getElementById('user-err').classList.add('hidden');
    loadUsers();
  }

  async function resetPassword(id, email) {
    if (!confirm(`Reset password for ${email}?\nA new temporary password will be emailed to them.`)) return;
    const r = await api(`/admin/users/${id}/reset-password`, { method: 'POST' });
    if (r && (r.ok || r.status === 204)) alert('Password reset email sent.');
  }

  async function loadBlocklist() {
    const r = await api('/admin/blocklist');
    if (!r) return;
    const words = await r.json();
    const list = document.getElementById('blocklist');
    if (!words.length) {
      list.innerHTML = '<li class="text-gray-500">No blocked words.</li>';
    } else {
      list.innerHTML = words.map(w => `
        <li class="flex items-center justify-between py-1">
          <span class="font-mono">${w.word}</span>
          <button onclick="removeWord('${w.word}')" class="text-red-400 hover:text-red-300 text-xs">Remove</button>
        </li>`).join('');
    }
  }

  function showBlocklistForm() {
    document.getElementById('bl-form').classList.remove('hidden');
    document.getElementById('bl-word').focus();
  }

  async function addBlocklistWord() {
    const word = document.getElementById('bl-word').value.trim();
    if (!word) return;
    await api('/admin/blocklist', { method: 'POST', body: JSON.stringify({ words: [word] }) });
    document.getElementById('bl-word').value = '';
    document.getElementById('bl-form').classList.add('hidden');
    loadBlocklist();
  }

  async function removeWord(word) {
    await api('/admin/blocklist/' + word, { method: 'DELETE' });
    loadBlocklist();
  }

  loadUsers();
  loadBlocklist();
</script>
{% endblock %}
