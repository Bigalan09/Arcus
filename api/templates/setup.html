{% extends "base.html" %}
{% block title %}Setup – Arcus{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto">
  <h1 class="text-2xl font-semibold mb-1">Welcome to Arcus</h1>
  <p class="text-gray-400 mb-8 text-sm">Create your admin account to get started.</p>
  <form id="setup-form" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-300 mb-1">Email</label>
      <input name="email" type="email" required autocomplete="email"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Password</label>
      <input name="password" type="password" required autocomplete="new-password" minlength="8"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>
    <p id="err" class="text-red-400 text-sm hidden"></p>
    <button type="submit"
      class="w-full bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-4 py-2 text-sm font-medium transition">
      Create admin account
    </button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('setup-form').addEventListener('submit', async e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/auth/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      window.location.href = '/login?setup=1';
    } else {
      const j = await res.json();
      const err = document.getElementById('err');
      err.textContent = j.detail || 'Setup failed.';
      err.classList.remove('hidden');
    }
  });
</script>
{% endblock %}
