{% extends "base.html" %}
{% block title %}Sign in – Arcus{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto">
  <h1 class="text-2xl font-semibold mb-1">Sign in</h1>
  <p class="text-gray-400 mb-8 text-sm">Access your Arcus dashboard.</p>
  {% if setup_done %}
  <div class="mb-4 rounded-lg bg-green-900/60 text-green-300 px-4 py-3 text-sm">
    Admin account created. Sign in below.
  </div>
  {% endif %}
  <form id="login-form" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-300 mb-1">Email</label>
      <input name="email" type="email" required autocomplete="email"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Password</label>
      <input name="password" type="password" required autocomplete="current-password"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>
    <p id="err" class="text-red-400 text-sm hidden"></p>
    <button type="submit"
      class="w-full bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-4 py-2 text-sm font-medium transition">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      const j = await res.json();
      if (j.must_change_password) {
        window.location.href = '/change-password';
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      const j = await res.json();
      const err = document.getElementById('err');
      err.textContent = j.detail || 'Sign in failed.';
      err.classList.remove('hidden');
    }
  });
</script>
{% endblock %}
