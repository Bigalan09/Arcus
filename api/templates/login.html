{% extends "base.html" %}
{% block title %}Sign in – Arcus{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto app-card p-6">
  <h1 class="text-2xl font-semibold mb-1">Sign in</h1>
  <p class="text-gray-400 mb-6 text-sm">Access your Arcus dashboard.</p>
  {% if setup_done %}
  <div class="mb-4 app-alert app-alert-success">
    Admin account created. Sign in below.
  </div>
  {% endif %}
  <form id="login-form" class="space-y-4">
    <div>
      <label class="app-label">Email</label>
      <input name="email" type="email" required autocomplete="email"
        class="app-input">
    </div>
    <div>
      <label class="app-label">Password</label>
      <input name="password" type="password" required autocomplete="current-password"
        class="app-input">
    </div>
    <p id="err" class="hidden app-alert app-alert-error"></p>
    <button id="login-submit" type="submit" class="w-full app-btn app-btn-primary">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const submit = document.getElementById('login-submit');
    const err = document.getElementById('err');
    err.classList.add('hidden');
    ui.setButtonBusy(submit, true, 'Signing in...');
    const data = Object.fromEntries(new FormData(e.target));
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        cache: 'no-store',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        const j = await res.json();
        if (j.must_change_password) {
          window.location.replace('/change-password');
        } else {
          window.location.replace('/dashboard');
        }
      } else {
        err.textContent = await ui.parseApiError(res, 'Sign in failed.');
        err.classList.remove('hidden');
      }
    } catch (_) {
      err.textContent = 'Sign in failed.';
      err.classList.remove('hidden');
    } finally {
      ui.setButtonBusy(submit, false);
    }
  });
</script>
{% endblock %}
